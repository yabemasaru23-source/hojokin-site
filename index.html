<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>三社 補助金・助成金 管理サイト</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Subsidy Tracker</p>
        <h1>三社 補助金・助成金 管理サイト</h1>
        <p class="lead">所在地別の候補制度、締切、必要書類、申請準備を一つの画面で確認できます。</p>
      </div>
      <div class="top-actions">
        <button id="exportProgress" class="ghost">進捗を出力</button>
        <label class="ghost file-label">
          進捗を取込
          <input id="importProgress" type="file" accept="application/json" />
        </label>
        <button onclick="window.print()">印刷</button>
      </div>
    </header>

    <main>
      <section class="stats" aria-label="概要">
        <div>
          <span id="companyCount">0</span>
          <small>対象会社</small>
        </div>
        <div>
          <span id="grantCount">0</span>
          <small>候補制度</small>
        </div>
        <div>
          <span id="deadlineCount">0</span>
          <small>期限あり</small>
        </div>
        <div>
          <span id="urgentCount">0</span>
          <small>30日以内</small>
        </div>
      </section>

      <section class="toolbar" aria-label="絞り込み">
        <label>
          会社
          <select id="companyFilter"></select>
        </label>
        <label>
          地域
          <select id="areaFilter"></select>
        </label>
        <label>
          優先度
          <select id="priorityFilter">
            <option value="all">すべて</option>
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C">C</option>
          </select>
        </label>
        <label class="search-label">
          検索
          <input id="searchInput" type="search" placeholder="制度名・必要書類・経費で検索" />
        </label>
      </section>

      <section class="layout">
        <aside class="side-panel">
          <h2>会社別の状況</h2>
          <div id="companyCards" class="company-list"></div>
        </aside>

        <section class="content-panel">
          <div class="section-heading">
            <div>
              <h2>補助金・助成金一覧</h2>
              <p id="resultNote">表示中の制度を確認できます。</p>
            </div>
            <button id="resetFilters" class="ghost">絞り込み解除</button>
          </div>
          <div id="grantList" class="grant-grid"></div>
        </section>
      </section>

      <section class="two-column">
        <section>
          <div class="section-heading">
            <div>
              <h2>締切カレンダー</h2>
              <p>近い順に表示。日付が未確定の制度は一覧側で確認します。</p>
            </div>
          </div>
          <div id="milestoneList" class="timeline"></div>
        </section>

        <section>
          <div class="section-heading">
            <div>
              <h2>準備チェックリスト</h2>
              <p>チェック状態はこのブラウザに保存されます。共有時は「進捗を出力」を使います。</p>
            </div>
          </div>
          <div id="checklist" class="checklist"></div>
        </section>
      </section>
    </main>

    <dialog id="grantDialog">
      <div class="dialog-head">
        <div>
          <p id="dialogMeta" class="eyebrow"></p>
          <h2 id="dialogTitle"></h2>
        </div>
        <button id="closeDialog" class="icon-button" aria-label="閉じる">×</button>
      </div>
      <div id="dialogBody"></div>
    </dialog>

    <footer>
      <p>最終更新: <span id="updatedAt"></span>。申請前には必ず公式URLの募集要項を確認してください。</p>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
